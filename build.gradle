def rootWorkingFolder = [location :new File("").absolutePath]
def orchestra = [name: "orchestra"]
def dataRuntime = [name: "dataRuntime"]
def executionClient= [name: "executionClient"]
def testFolder = [name : "testFolder"]
def masterConfig = [rootWorkingFolder, orchestra, dataRuntime, executionClient, testFolder]

def setLocation = { config ->
    config.location = "$rootWorkingFolder.location/$config.name"
}

def makeBackup = {File folder, backupName ->
    if (folder.isDirectory()) {

    }
}

task myInit << {
    [orchestra, dataRuntime, executionClient, testFolder].each(setLocation)
}

task myConfig(dependsOn: "myInit") << {
    def header = "---My config---"
    println header
    masterConfig.each { config ->
        println config
    }
            header.size().times {print "-"}
}

task runTest(dependsOn: "myInit") << {
    def header = "---Commence run test---"
    println header
    def rootFolderOfTest = new File("$rootWorkingFolder.location/$testFolder.name")
    if(rootFolderOfTest.mkdirs()) {
        println "successfully created:$testFolder.name"
    }
    header.size().times {print "-"}
}

task cleanTest(dependsOn: "myInit") << {
    def header = "---Clean test---"
    println header
    def rootFolderOfTest = new File("$rootWorkingFolder.location/$testFolder.name")
    delete rootFolderOfTest

    header.size().times {print "-"}
}

task backupDataFile(type: Copy) << {
    def header = "---backupDataFile---"
    println header

    //your code goes here
    def dataFile = [name: "DataFiles"]
    def dataFileCopy = [name: "DataFiles - Copy"]

    def copyFrom = new File("$rootWorkingFolder.location/$dataRuntime.name/$dataFile.name")
    def copyOfDataFile = new File("$rootWorkingFolder.location/$dataRuntime.name/$dataFileCopy.name")
    if(copyOfDataFile.mkdirs()) {
        println "successfully created:$dataFileCopy.name"
    }

    from copyFrom
    into copyOfDataFile

    header.size().times {print "-"}
}

task backupExecutionClient(type: Copy) << {
    def header = "---backupExecutionClient---"
    println header

    //your code goes here
    def executionClientCopy = [name: "executionClient - Copy"]

    def copyFrom = new File("$rootWorkingFolder.location/$executionClient.name")
    def copyOfExecutionClient = new File("$rootWorkingFolder.location/$executionClientCopy.name")
    if(copyOfExecutionClient.mkdirs()) {
        println "successfully created:$executionClientCopy.name"
    }

    from copyFrom
    into copyOfExecutionClient

    header.size().times {print "-"}
}

task housekeepDataFile(type: Copy)  {
    def header = "~~~housekeepDataFile~~~"
    println header

    def dataFile = [name: "DataFiles"]
    def dataFileCopy = [name: "DataFiles - Copy"]

    def dataFiles = new File("$rootWorkingFolder.location/$dataRuntime.name/$dataFile.name")
    def copyOfDataFile = new File("$rootWorkingFolder.location/$dataRuntime.name/$dataFileCopy.name")
    println copyOfDataFile
    if (!copyOfDataFile.exists()) {
        println "~~~copy not exists~~~"
    }
    if (copyOfDataFile.exists()) {
        dataFiles.delete()

        dataFiles.mkdirs()

        from copyOfDataFile
        into dataFiles

        println "~~~housekeeping success!~~~"
    }

}